        "200":
          description: Paginated library cards.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryCardListResponse"
  /trinkets:
    get:
      summary: List Battlegrounds trinkets
      parameters:
        - $ref: "#/components/parameters/LibraryQuery"
        - $ref: "#/components/parameters/LibraryDbfQuery"
        - $ref: "#/components/parameters/LibraryInPoolQuery"
        - $ref: "#/components/parameters/LibraryStatusQuery"
        - $ref: "#/components/parameters/LibraryGroupQuery"
        - $ref: "#/components/parameters/UpdatedSinceQuery"
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/PerPageQuery"
      responses:
        "200":
          description: Paginated trinket library cards. Use group=lesser or group=greater to split lesser and greater trinkets.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryCardListResponse"
  /libraries/{library}:
    get:
      summary: List one auxiliary Battlegrounds library
      parameters:
        - $ref: "#/components/parameters/LibraryPath"
        - $ref: "#/components/parameters/LibraryQuery"
        - $ref: "#/components/parameters/LibraryDbfQuery"
        - $ref: "#/components/parameters/LibraryInPoolQuery"
        - $ref: "#/components/parameters/LibraryStatusQuery"
        - $ref: "#/components/parameters/LibraryGroupQuery"
        - $ref: "#/components/parameters/UpdatedSinceQuery"
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/PerPageQuery"
      responses:
        "200":
          description: Paginated library cards.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryCardListResponse"
        "400":
          $ref: "#/components/responses/Error"
  /libraries/{library}/{card_id}:
    get:
      summary: Get one auxiliary library card by card_id
      parameters:
        - $ref: "#/components/parameters/LibraryPath"
        - name: card_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Library card.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeroResponse"
        "404":
          $ref: "#/components/responses/Error"
  /libraries/{library}/by-dbf/{dbf}:
    get:
      summary: Get one auxiliary library card by dbf
      parameters:
        - $ref: "#/components/parameters/LibraryPath"
        - name: dbf
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Library card.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryCardResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /heroes:
    get:
      summary: List Battlegrounds heroes
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Search by Russian/English hero name, card_id, dbf, hero power, or buddy.
        - name: dbf
          in: query
          schema:
            type: integer
            minimum: 0
        - name: updated_since
          in: query
          description: Return heroes with updated_at greater than or equal to this ISO 8601 timestamp.
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Paginated heroes.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            Last-Modified:
              $ref: "#/components/headers/LastModified"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeroListResponse"
        "400":
          $ref: "#/components/responses/Error"
  /heroes/{card_id}:
    get:
      summary: Get one Battlegrounds hero by card_id
      parameters:
        - name: card_id
          in: path
          required: true
          schema:
            type: string
          example: TB_BaconShop_HERO_16
      responses:
        "200":
          description: Hero.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            Last-Modified:
              $ref: "#/components/headers/LastModified"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeroResponse"
        "404":
          $ref: "#/components/responses/Error"
  /heroes/by-dbf/{dbf}:
    get:
      summary: Get one Battlegrounds hero by dbf
      parameters:
        - name: dbf
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
          example: 57944
      responses:
        "200":
          description: Hero.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            Last-Modified:
              $ref: "#/components/headers/LastModified"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeroResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /hero-skins:
    get:
      summary: List Hearthstone hero skins
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Search by skin name, card_id, dbf, character, actor, artist, class, or category.
        - name: dbf
          in: query
          schema:
            type: integer
            minimum: 0
        - name: class
          in: query
          schema:
            type: string
          description: Hero class slug, for example deathknight, mage, warrior, or neutral.
        - name: category
          in: query
          schema:
            type: string
          description: Wiki category slug, for example 1800_gold_skins, bundle_skins, legendary_skins, mythic_skins, or unavailable.
        - name: has_animated
          in: query
          schema:
            type: integer
            enum: [0, 1]
          description: 1 returns skins with an animated GIF or animated asset IDs.
        - name: has_gallery
          in: query
          schema:
            type: integer
            enum: [0, 1]
          description: 1 returns skins with at least one gallery item.
        - name: has_sounds
          in: query
          schema:
            type: integer
            enum: [0, 1]
          description: 1 returns skins with at least one sound entry.
        - name: updated_since
          in: query
          description: Return skins with updated_at greater than or equal to this ISO 8601 timestamp.
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Paginated hero skins.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            Last-Modified:
              $ref: "#/components/headers/LastModified"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeroSkinListResponse"
        "400":
          $ref: "#/components/responses/Error"
  /hero-skins/{card_id}:
    get:
      summary: Get one Hearthstone hero skin by card_id
      parameters:
        - name: card_id
          in: path
          required: true
          schema:
            type: string
          example: HERO_11b
      responses:
        "200":
          description: Hero skin.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            Last-Modified:
              $ref: "#/components/headers/LastModified"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeroSkinResponse"
        "404":
          $ref: "#/components/responses/Error"
  /hero-skins/by-dbf/{dbf}:
    get:
      summary: Get one Hearthstone hero skin by dbf
      parameters:
        - name: dbf
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
          example: 93448
      responses:
        "200":
          description: Hero skin.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            Last-Modified:
              $ref: "#/components/headers/LastModified"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeroSkinResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
components:
  headers:
    CacheControl:
      schema:
        type: string
      example: public, max-age=300, stale-while-revalidate=60
    ETag:
      schema:
        type: string
      example: "\"d58383073176b274cbc042447be79f20a62c574dd80d3ad1e0c0b41836331a97\""
    LastModified:
      schema:
        type: string
      example: Fri, 12 Jun 2026 20:17:09 GMT
  parameters:
    LibraryPath:
      name: library
      in: path
      required: true
      schema:
        type: string
        enum: [anomaly, quest, darkmoon_prize, reward, trinket]
    LibraryQuery:
      name: q
      in: query
      schema:
        type: string
      description: Search by Russian/English name, text, card_id, or dbf.
    LibraryDbfQuery:
      name: dbf
      in: query
      schema:
        type: integer
        minimum: 0
    LibraryInPoolQuery:
      name: in_pool
      in: query
      schema:
        type: integer
        enum: [0, 1]
      description: 1 for available/current pool entries, 0 for removed entries.
    LibraryStatusQuery:
      name: status
      in: query
      schema:
        type: string
        enum: [available, removed]
    LibraryGroupQuery:
      name: group
      in: query
      schema:
        type: string
        enum: [lesser, greater]
      description: Trinkets only. lesser = малые аксессуары, greater = большие аксессуары.
    LibraryTierQuery:
      name: tier
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 4
      description: Darkmoon Prizes only. Matches Hearthstone Wiki sections Prize Turn 1..4.
    UpdatedSinceQuery:
      name: updated_since
      in: query
      schema:
        type: string
        format: date-time
    PageQuery:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPageQuery:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
