openapi: 3.1.0
info:
  title: HS Battlegrounds RU API
  version: 1.1.0
  description: Public free JSON API for Russian Hearthstone Battlegrounds cards.
servers:
  - url: https://db.kolodahs.ru/api/v1
paths:
  /:
    get:
      summary: API information
      responses:
        "200":
          description: API status and available endpoints.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            Last-Modified:
              $ref: "#/components/headers/LastModified"
          content:
            application/json:
              schema:
                type: object
                required:
                  - name
                  - version
                  - status
                  - cards_total
                  - endpoints
                properties:
                  name:
                    type: string
                  version:
                    type: string
                  status:
                    type: string
                  cards_total:
                    type: integer
                  endpoints:
                    type: object
                    additionalProperties:
                      type: string
              examples:
                apiInfo:
                  summary: API root response
                  value:
                    name: HS Battlegrounds RU API
                    version: 1.1.0
                    status: ok
                    cards_total: 946
                    endpoints:
                      meta: /api/v1/meta
                      cards: /api/v1/cards
                      card_by_id: /api/v1/cards/{card_id}
                      card_by_dbf: /api/v1/cards/by-dbf/{dbf}
  /meta:
    get:
      summary: API metadata
      responses:
        "200":
          description: Creature types, mechanics, tavern tiers, and aggregate counters.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            Last-Modified:
              $ref: "#/components/headers/LastModified"
          content:
            application/json:
              schema:
                type: object
                required:
                  - totals
                  - creature_types
                  - mechanics
                  - tavern_tiers
                  - counts_by_tier
                  - counts_by_creature_type
                properties:
                  totals:
                    $ref: "#/components/schemas/Totals"
                  creature_types:
                    type: array
                    items:
                      $ref: "#/components/schemas/CreatureType"
                  mechanics:
                    type: array
                    items:
                      $ref: "#/components/schemas/Mechanic"
                  tavern_tiers:
                    type: array
                    items:
                      type: integer
                  counts_by_tier:
                    type: array
                    items:
                      $ref: "#/components/schemas/TierCount"
                  counts_by_creature_type:
                    type: array
                    items:
                      $ref: "#/components/schemas/CreatureTypeCount"
              examples:
                meta:
                  summary: Metadata with mechanics
                  value:
                    totals:
                      cards: 946
                      in_pool: 277
                      duos_only: 29
                      with_framed_image: 946
                    creature_types:
                      - slug: all
                        name_ru: Общие
                      - slug: undead
                        name_ru: Нежить
                      - slug: mech
                        name_ru: Механизм
                    mechanics:
                      - slug: BATTLECRY
                        name_ru: Боевой клич
                      - slug: START_OF_COMBAT
                        name_ru: Начало боя
                      - slug: DIVINE_SHIELD
                        name_ru: Божественный щит
                    tavern_tiers: [1, 2, 3, 4, 5, 6, 7]
                    counts_by_tier:
                      - tavern_tier: 1
                        count: 74
                    counts_by_creature_type:
                      - slug: mech
                        name_ru: Механизм
                        count: 99
  /cards:
    get:
      summary: List cards
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Search by Russian/English name, card_id, dbf, or Russian text.
        - name: tier
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 7
        - name: creature_type
          in: query
          schema:
            $ref: "#/components/schemas/CreatureTypeSlug"
        - name: dbf
          in: query
          schema:
            type: integer
            minimum: 0
        - name: in_pool
          in: query
          schema:
            type: integer
            enum: [0, 1]
        - name: duos_only
          in: query
          schema:
            type: integer
            enum: [0, 1]
        - name: updated_since
          in: query
          description: Return cards with updated_at greater than or equal to this ISO 8601 timestamp.
          schema:
            type: string
            format: date-time
          example: "2026-06-12T00:00:00Z"
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Paginated cards.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            Last-Modified:
              $ref: "#/components/headers/LastModified"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardListResponse"
              examples:
                firstInPoolCard:
                  summary: One-card page from the current pool
                  value:
                    data:
                      - id: 15
                        card_id: BG26_146
                        dbf: 98582
                        name:
                          ru: Баюбот
                          en: Lullabot
                        tavern_tier: 1
                        creature_type:
                          slug: mech
                          name_ru: Механизм
                        attack: 2
                        health: 2
                        in_pool: true
                        duos_only: false
                        mechanics:
                          - slug: END_OF_TURN_TRIGGER
                            name_ru: В конце хода
                          - slug: MAGNETIC
                            name_ru: Магнетизм
                        text_ru: |-
                          Магнетизм. В конце вашего хода получает +1 к здоровью.

                          Типы: Механизм

                          Механики: END_OF_TURN_TRIGGER, MAGNETIC

                          Золотая версия dbf: 98585
                        images:
                          card: https://db.kolodahs.ru/uploads/cards/BG26_146.png
                          golden: https://db.kolodahs.ru/uploads/golden/BG26_146.png
                          art: https://db.kolodahs.ru/uploads/art/BG26_146.jpg
                          framed: https://db.kolodahs.ru/uploads/framed/BG26_146.png
                        created_at: "2026-06-12 12:56:19"
                        updated_at: "2026-06-12 20:16:19"
                    pagination:
                      page: 1
                      per_page: 1
                      total: 277
                      total_pages: 277
                      has_next: true
                      has_prev: false
        "400":
          $ref: "#/components/responses/Error"
  /cards/by-dbf/{dbf}:
    get:
      summary: Get one card by dbf
      parameters:
        - name: dbf
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
          example: 95267
      responses:
        "200":
          description: Card.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            Last-Modified:
              $ref: "#/components/headers/LastModified"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardResponse"
              examples:
                nerubianDeathswarmer:
                  $ref: "#/components/examples/NerubianDeathswarmer"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /cards/{card_id}:
    get:
      summary: Get one card by card_id
      parameters:
        - name: card_id
          in: path
          required: true
          schema:
            type: string
          example: BG25_011
      responses:
        "200":
          description: Card.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            Last-Modified:
              $ref: "#/components/headers/LastModified"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardResponse"
              examples:
                nerubianDeathswarmer:
                  $ref: "#/components/examples/NerubianDeathswarmer"
        "404":
          $ref: "#/components/responses/Error"
components:
  headers:
    CacheControl:
      schema:
        type: string
      example: public, max-age=300, stale-while-revalidate=60
    ETag:
      schema:
        type: string
      example: "\"d58383073176b274cbc042447be79f20a62c574dd80d3ad1e0c0b41836331a97\""
    LastModified:
      schema:
        type: string
      example: Fri, 12 Jun 2026 20:17:09 GMT
  schemas:
    CreatureTypeSlug:
      type: string
      enum:
        - all
        - undead
        - dragon
        - mech
        - murloc
        - demon
        - quilboar
        - naga
        - pirate
        - beast
        - elemental
    CreatureType:
      type: object
      properties:
        slug:
          $ref: "#/components/schemas/CreatureTypeSlug"
        name_ru:
          type: string
      required:
        - slug
        - name_ru
    MechanicSlug:
      type: string
      enum:
        - AURA
        - AVENGE
        - BACON_RALLY
        - BACON_SPELLCRAFT_ID
        - BATTLECRY
        - CHOOSE_ONE
        - DEATHRATTLE
        - DISCOVER
        - DIVINE_SHIELD
        - END_OF_TURN_TRIGGER
        - InvisibleDeathrattle
        - MAGNETIC
        - POISONOUS
        - REBORN
        - START_OF_COMBAT
        - STEALTH
        - TAUNT
        - TRIGGER_VISUAL
        - VENOMOUS
        - WINDFURY
    Mechanic:
      type: object
      properties:
        slug:
          $ref: "#/components/schemas/MechanicSlug"
        name_ru:
          type: string
          example: Боевой клич
      required:
        - slug
        - name_ru
    Card:
      type: object
      properties:
        id:
          type: integer
        card_id:
          type: string
        dbf:
          type:
            - integer
            - "null"
        name:
          type: object
          properties:
            ru:
              type: string
            en:
              type:
                - string
                - "null"
          required:
            - ru
            - en
        tavern_tier:
          type:
            - integer
            - "null"
        creature_type:
          oneOf:
            - $ref: "#/components/schemas/CreatureType"
            - type: "null"
        attack:
          type:
            - integer
            - "null"
        health:
          type:
            - integer
            - "null"
        in_pool:
          type: boolean
        duos_only:
          type: boolean
        mechanics:
          type: array
          description: Mechanics parsed from the card source, such as battlecry, start of combat, divine shield, taunt, reborn, and other Hearthstone Battlegrounds mechanics.
          items:
            $ref: "#/components/schemas/Mechanic"
        text_ru:
          type:
            - string
            - "null"
        images:
          $ref: "#/components/schemas/CardImages"
        created_at:
          type: string
          example: "2026-06-09 14:27:24"
        updated_at:
          type: string
          example: "2026-06-12 20:16:17"
      required:
        - id
        - card_id
        - dbf
        - name
        - tavern_tier
        - creature_type
        - attack
        - health
        - in_pool
        - duos_only
        - mechanics
        - text_ru
        - images
        - created_at
        - updated_at
    CardImages:
      type: object
      properties:
        card:
          type:
            - string
            - "null"
          format: uri
        golden:
          type:
            - string
            - "null"
          format: uri
        art:
          type:
            - string
            - "null"
          format: uri
        framed:
          type:
            - string
            - "null"
          format: uri
      required:
        - card
        - golden
        - art
        - framed
    CardResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Card"
      required:
        - data
    CardListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Card"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required:
        - data
        - pagination
    Pagination:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
        has_next:
          type: boolean
        has_prev:
          type: boolean
      required:
        - page
        - per_page
        - total
        - total_pages
        - has_next
        - has_prev
    Totals:
      type: object
      properties:
        cards:
          type: integer
        in_pool:
          type: integer
        duos_only:
          type: integer
        with_framed_image:
          type: integer
      required:
        - cards
        - in_pool
        - duos_only
        - with_framed_image
    TierCount:
      type: object
      properties:
        tavern_tier:
          type:
            - integer
            - "null"
        count:
          type: integer
      required:
        - tavern_tier
        - count
    CreatureTypeCount:
      type: object
      properties:
        slug:
          type:
            - string
            - "null"
        name_ru:
          type:
            - string
            - "null"
        count:
          type: integer
      required:
        - slug
        - name_ru
        - count
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
          required:
            - code
            - message
      required:
        - error
  examples:
    NerubianDeathswarmer:
      summary: One card with a battlecry mechanic
      value:
        data:
          id: 9
          card_id: BG25_011
          dbf: 95267
          name:
            ru: Неруб-смертороевик
            en: Nerubian Deathswarmer
          tavern_tier: 2
          creature_type:
            slug: undead
            name_ru: Нежить
          attack: 1
          health: 4
          in_pool: true
          duos_only: false
          mechanics:
            - slug: BATTLECRY
              name_ru: Боевой клич
          text_ru: |-
            Боевой клич: ваша нежить получает +1 к атаке до конца матча (где бы она ни была).

            Типы: Нежить

            Механики: BATTLECRY

            Золотая версия dbf: 95268
          images:
            card: https://db.kolodahs.ru/uploads/cards/BG25_011.png
            golden: https://db.kolodahs.ru/uploads/golden/BG25_011.png
            art: https://db.kolodahs.ru/uploads/art/BG25_011.jpg
            framed: https://db.kolodahs.ru/uploads/framed/BG25_011.png
          created_at: "2026-06-09 14:27:24"
          updated_at: "2026-06-12 20:16:17"
  responses:
    Error:
      description: JSON error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            invalidParameter:
              summary: Invalid dbf path parameter
              value:
                error:
                  code: invalid_parameter
                  message: dbf должен быть целым неотрицательным числом.
            notFound:
              summary: Card not found
              value:
                error:
                  code: not_found
                  message: Карта не найдена.
