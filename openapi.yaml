openapi: 3.1.0
info:
  title: HS Battlegrounds RU API
  version: 1.8.1
  description: Public free JSON API for Russian Hearthstone Battlegrounds cards.
servers:
  - url: https://db.kolodahs.ru/api/v1
paths:
  /:
    get:
      summary: API information
      responses:
        "200":
          description: API status and available endpoints.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            Last-Modified:
              $ref: "#/components/headers/LastModified"
          content:
            application/json:
              schema:
                type: object
                required:
                  - name
                  - version
                  - status
                  - cards_total
                  - heroes_total
                  - hero_skins_total
                  - timewarped_total
                  - library_total
                  - constructed_total
                  - constructed_wiki_total
                  - endpoints
                properties:
                  name:
                    type: string
                  version:
                    type: string
                  status:
                    type: string
                  cards_total:
                    type: integer
                  heroes_total:
                    type: integer
                  hero_skins_total:
                    type: integer
                  timewarped_total:
                    type: integer
                  library_total:
                    type: integer
                  constructed_total:
                    type: integer
                  constructed_wiki_total:
                    type: integer
                  endpoints:
                    type: object
                    additionalProperties:
                      type: string
              examples:
                apiInfo:
                  summary: API root response
                  value:
                    name: HS Battlegrounds RU API
                    version: 1.8.1
                    status: ok
                    cards_total: 2352
                    heroes_total: 119
                    hero_skins_total: 701
                    timewarped_total: 161
                    library_total: 524
                    constructed_total: 6331
                    constructed_wiki_total: 6331
                    endpoints:
                      GET /api/v1: Описание API.
                      GET /api/v1/meta: Типы существ, уровни таверны и счетчики.
                      GET /api/v1/cards: Список карт с фильтрами и пагинацией.
                      GET /api/v1/cards?include=wiki: Список карт с wiki-метаданными, если они синхронизированы.
                      GET /api/v1/cards/{card_id}: Одна карта по card_id.
                      GET /api/v1/cards/{card_id}/wiki: Wiki-метаданные карты по card_id.
                      GET /api/v1/cards/by-dbf/{dbf}: Одна карта по dbf.
                      GET /api/v1/heroes: Список героев Полей сражений.
                      GET /api/v1/heroes/{card_id}: Один герой по card_id.
                      GET /api/v1/heroes/by-dbf/{dbf}: Один герой по dbf.
                      GET /api/v1/hero-skins: Список скинов героев Hearthstone со static/animated/full art, Gallery и Sounds.
                      GET /api/v1/hero-skins/{card_id}: Один скин героя по card_id.
                      GET /api/v1/hero-skins/by-dbf/{dbf}: Один скин героя по dbf.
                      GET /api/v1/timewarped-cards: Список хрономальных карт Timewarped Tavern.
                      GET /api/v1/timewarped-cards/{card_id}: Одна хрономальная карта по card_id.
                      GET /api/v1/timewarped-cards/by-dbf/{dbf}: Одна хрономальная карта по dbf.
                      GET /api/v1/anomalies: Библиотека аномалий.
                      GET /api/v1/quests: Библиотека квестов.
                      GET /api/v1/darkmoon-prizes: Библиотека призов Ярмарки Новолуния.
                      GET /api/v1/rewards: Библиотека наград.
                      GET /api/v1/trinkets: Библиотека аксессуаров.
                      GET /api/v1/libraries/{library}: Универсальный доступ к библиотекам.
  /meta:
    get:
      summary: API metadata
      responses:
        "200":
          description: Creature types, mechanics, tavern tiers, and aggregate counters.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            Last-Modified:
              $ref: "#/components/headers/LastModified"
          content:
            application/json:
              schema:
                type: object
                required:
                  - totals
                  - creature_types
                  - mechanics
                  - card_types
                  - tavern_tiers
                  - counts_by_tier
                  - counts_by_creature_type
                properties:
                  totals:
                    $ref: "#/components/schemas/Totals"
                  creature_types:
                    type: array
                    items:
                      $ref: "#/components/schemas/CreatureType"
                  mechanics:
                    type: array
                    items:
                      $ref: "#/components/schemas/Mechanic"
                  card_types:
                    type: array
                    items:
                      $ref: "#/components/schemas/CardType"
                  tavern_tiers:
                    type: array
                    items:
                      type: integer
                  counts_by_tier:
                    type: array
                    items:
                      $ref: "#/components/schemas/TierCount"
                  counts_by_creature_type:
                    type: array
                    items:
                      $ref: "#/components/schemas/CreatureTypeCount"
              examples:
                meta:
                  summary: Metadata with mechanics
                  value:
                    totals:
                      cards: 2352
                      minions: 2245
                      spells: 107
                      heroes: 119
                      hero_skins: 701
                      timewarped: 161
                      libraries: 524
                      constructed: 6331
                      constructed_standard: 1152
                      constructed_wild: 6331
                      constructed_wiki_ok: 6331
                      in_pool: 350
                      duos_only: 78
                      with_framed_image: 2352
                    creature_types:
                      - slug: all
                        name_ru: Общие
                      - slug: undead
                        name_ru: Нежить
                      - slug: mech
                        name_ru: Механизм
                    mechanics:
                      - slug: BATTLECRY
                        name_ru: Боевой клич
                      - slug: START_OF_COMBAT
                        name_ru: Начало боя
                      - slug: DIVINE_SHIELD
                        name_ru: Божественный щит
                    card_types:
                      - slug: minion
                        name_ru: Существо
                      - slug: spell
                        name_ru: Заклинание
                    tavern_tiers: [1, 2, 3, 4, 5, 6, 7]
                    counts_by_tier:
                      - tavern_tier: 1
                        count: 74
                    counts_by_creature_type:
                      - slug: mech
                        name_ru: Механизм
                        count: 99
  /cards:
    get:
      summary: List cards
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Search by Russian/English name, card_id, dbf, or Russian text.
        - name: tier
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 7
        - name: creature_type
          in: query
          schema:
            $ref: "#/components/schemas/CreatureTypeSlug"
        - name: dbf
          in: query
          schema:
            type: integer
            minimum: 0
        - name: card_type
          in: query
          schema:
            type: string
            enum: [minion, spell]
        - name: include
          in: query
          description: Pass `wiki` to include wiki metadata in each returned card when synchronized.
          schema:
            type: string
            enum: [wiki]
        - name: in_pool
          in: query
          schema:
            type: integer
            enum: [0, 1]
        - name: duos_only
          in: query
          schema:
            type: integer
            enum: [0, 1]
        - name: updated_since
          in: query
          description: Return cards with updated_at greater than or equal to this ISO 8601 timestamp.
          schema:
            type: string
            format: date-time
          example: "2026-06-12T00:00:00Z"
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Paginated cards.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            Last-Modified:
              $ref: "#/components/headers/LastModified"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardListResponse"
              examples:
                firstInPoolCard:
                  summary: One-card page from the current pool
                  value:
                    data:
                      - id: 15
                        card_id: BG26_146
                        dbf: 98582
                        card_type:
                          slug: minion
                          name_ru: Существо
                        name:
                          ru: Баюбот
                          en: Lullabot
                        tavern_tier: 1
                        creature_type:
                          slug: mech
                          name_ru: Механизм
                        attack: 2
                        health: 2
                        in_pool: true
                        duos_only: false
                        mechanics:
                          - slug: END_OF_TURN_TRIGGER
                            name_ru: В конце хода
                          - slug: MAGNETIC
                            name_ru: Магнетизм
                        text_ru: |-
                          Магнетизм. В конце вашего хода получает +1 к здоровью.

                          Типы: Механизм

                          Механики: END_OF_TURN_TRIGGER, MAGNETIC

                          Золотая версия dbf: 98585
                        images:
                          card: https://db.kolodahs.ru/uploads/cards/BG26_146.png
                          golden: https://db.kolodahs.ru/uploads/golden/BG26_146.png
                          art: https://db.kolodahs.ru/uploads/art/BG26_146.jpg
                          framed: https://db.kolodahs.ru/uploads/framed/BG26_146.png
                        created_at: "2026-06-12 12:56:19"
                        updated_at: "2026-06-12 20:16:19"
                    pagination:
                      page: 1
                      per_page: 1
                      total: 277
                      total_pages: 277
                      has_next: true
                      has_prev: false
        "400":
          $ref: "#/components/responses/Error"
  /cards/by-dbf/{dbf}:
    get:
      summary: Get one card by dbf
      parameters:
        - name: dbf
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
          example: 95267
        - name: include
          in: query
          description: Pass `wiki` to include wiki metadata in the returned card when synchronized.
          schema:
            type: string
            enum: [wiki]
      responses:
        "200":
          description: Card.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            Last-Modified:
              $ref: "#/components/headers/LastModified"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardResponse"
              examples:
                nerubianDeathswarmer:
                  $ref: "#/components/examples/NerubianDeathswarmer"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /cards/{card_id}:
    get:
      summary: Get one card by card_id
      parameters:
        - name: card_id
          in: path
          required: true
          schema:
            type: string
          example: BG25_011
        - name: include
          in: query
          description: Pass `wiki` to include wiki metadata in the returned card when synchronized.
          schema:
            type: string
            enum: [wiki]
      responses:
        "200":
          description: Card.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            Last-Modified:
              $ref: "#/components/headers/LastModified"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardResponse"
              examples:
                nerubianDeathswarmer:
                  $ref: "#/components/examples/NerubianDeathswarmer"
        "404":
          $ref: "#/components/responses/Error"
  /cards/{card_id}/wiki:
    get:
      summary: Get wiki metadata by card_id
      parameters:
        - name: card_id
          in: path
          required: true
          schema:
            type: string
          example: BG_AT_069
      responses:
        "200":
          description: Wiki metadata.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            Last-Modified:
              $ref: "#/components/headers/LastModified"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WikiResponse"
        "404":
          $ref: "#/components/responses/Error"
  /cards/by-dbf/{dbf}/wiki:
    get:
      summary: Get wiki metadata by dbf
      parameters:
        - name: dbf
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
          example: 92878
      responses:
        "200":
          description: Wiki metadata.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            Last-Modified:
              $ref: "#/components/headers/LastModified"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WikiResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /timewarped-cards:
    get:
      summary: List Timewarped Tavern cards
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Search by Russian/English name, card text, card_id, or dbf.
        - name: tier
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 7
        - name: card_type
          in: query
          schema:
            type: string
            enum: [minion, spell, hero_power]
        - name: dbf
          in: query
          schema:
            type: integer
            minimum: 0
        - name: updated_since
          in: query
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Paginated Timewarped cards.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            Last-Modified:
              $ref: "#/components/headers/LastModified"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimewarpedCardListResponse"
        "400":
          $ref: "#/components/responses/Error"
  /timewarped-cards/{card_id}:
    get:
      summary: Get one Timewarped Tavern card by card_id
      parameters:
        - name: card_id
          in: path
          required: true
          schema:
            type: string
          example: BG34_Giant_009
      responses:
        "200":
          description: Timewarped card.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            Last-Modified:
              $ref: "#/components/headers/LastModified"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimewarpedCardResponse"
        "404":
          $ref: "#/components/responses/Error"
  /timewarped-cards/by-dbf/{dbf}:
    get:
      summary: Get one Timewarped Tavern card by dbf
      parameters:
        - name: dbf
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
          example: 126343
      responses:
        "200":
          description: Timewarped card.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CacheControl"
            ETag:
              $ref: "#/components/headers/ETag"
            Last-Modified:
              $ref: "#/components/headers/LastModified"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimewarpedCardResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /anomalies:
    get:
      summary: List Battlegrounds anomalies
      parameters:
        - $ref: "#/components/parameters/LibraryQuery"
        - $ref: "#/components/parameters/LibraryDbfQuery"
        - $ref: "#/components/parameters/LibraryInPoolQuery"
        - $ref: "#/components/parameters/LibraryStatusQuery"
        - $ref: "#/components/parameters/UpdatedSinceQuery"
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/PerPageQuery"
      responses:
        "200":
          description: Paginated library cards.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryCardListResponse"
  /quests:
    get:
      summary: List Battlegrounds quests
      parameters:
        - $ref: "#/components/parameters/LibraryQuery"
        - $ref: "#/components/parameters/LibraryDbfQuery"
        - $ref: "#/components/parameters/LibraryInPoolQuery"
        - $ref: "#/components/parameters/LibraryStatusQuery"
        - $ref: "#/components/parameters/UpdatedSinceQuery"
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/PerPageQuery"
      responses:
        "200":
          description: Paginated library cards.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryCardListResponse"
  /darkmoon-prizes:
    get:
      summary: List Battlegrounds Darkmoon Prizes
      parameters:
        - $ref: "#/components/parameters/LibraryQuery"
        - $ref: "#/components/parameters/LibraryDbfQuery"
        - $ref: "#/components/parameters/LibraryInPoolQuery"
        - $ref: "#/components/parameters/LibraryStatusQuery"
        - $ref: "#/components/parameters/LibraryTierQuery"
        - $ref: "#/components/parameters/UpdatedSinceQuery"
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/PerPageQuery"
      responses:
        "200":
          description: Paginated library cards.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryCardListResponse"
  /rewards:
    get:
      summary: List Battlegrounds rewards
      parameters:
        - $ref: "#/components/parameters/LibraryQuery"
        - $ref: "#/components/parameters/LibraryDbfQuery"
        - $ref: "#/components/parameters/LibraryInPoolQuery"
        - $ref: "#/components/parameters/LibraryStatusQuery"
        - $ref: "#/components/parameters/UpdatedSinceQuery"
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/PerPageQuery"
