        - BACON_SPELLCRAFT_ID
        - BATTLECRY
        - CHOOSE_ONE
        - DEATHRATTLE
        - DISCOVER
        - DIVINE_SHIELD
        - END_OF_TURN_TRIGGER
        - InvisibleDeathrattle
        - MAGNETIC
        - POISONOUS
        - REBORN
        - START_OF_COMBAT
        - STEALTH
        - TAUNT
        - TRIGGER_VISUAL
        - VENOMOUS
        - WINDFURY
    Mechanic:
